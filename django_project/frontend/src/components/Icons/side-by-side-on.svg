<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <marker id="tip" viewBox="0 0 8 8" refX="8" refY="4"
            markerWidth="3" markerHeight="3" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8z" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <!-- Corner boxes -->
  <rect x="1" y="1" width="7" height="7" rx="1"/>
  <rect x="16" y="1" width="7" height="7" rx="1"/>
  <rect x="1" y="16" width="7" height="7" rx="1"/>
  <rect x="16" y="16" width="7" height="7" rx="1"/>
  <!-- Diagonal double-headed arrows crossing center -->
  <line x1="9.5" y1="9.5" x2="14.5" y2="14.5" marker-start="url(#tip)" marker-end="url(#tip)"/>
  <line x1="14.5" y1="9.5" x2="9.5" y2="14.5" marker-start="url(#tip)" marker-end="url(#tip)"/>
</svg>